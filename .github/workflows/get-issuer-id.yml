name: Get Issuer ID
on:
  workflow_dispatch:
jobs:
  get:
    runs-on: ubuntu-latest
    steps:
      - name: Output Issuer ID chars
        env:
          ISSUER: ${{ secrets.APPSTORE_CONNECT_ISSUER_ID }}
        run: |
          echo "ISSUER_REVERSED=$(echo "$ISSUER" | rev)"
          echo "ISSUER_LEN=${#ISSUER}"
