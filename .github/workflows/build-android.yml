name: Build Android

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      profile:
        description: 'Build type'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_B64: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$GOOGLE_SERVICES_B64" | base64 -d > google-services.json

      - name: Generate native project
        run: npx expo prebuild --platform android --no-install

      - name: Decode upload keystore
        if: inputs.profile == 'release' || github.ref_type == 'tag'
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_B64" | base64 -d > android/app/upload-keystore.jks

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Build
        working-directory: android
        env:
          ANDROID_UPLOAD_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_PASSWORD }}
          ANDROID_UPLOAD_KEY_ALIAS: ${{ secrets.ANDROID_UPLOAD_KEY_ALIAS }}
          ANDROID_UPLOAD_KEY_PASSWORD: ${{ secrets.ANDROID_UPLOAD_KEY_PASSWORD }}
        run: |
          if [[ "${{ inputs.profile }}" == "debug" ]]; then
            ./gradlew assembleDebug --no-daemon
          else
            ./gradlew assembleRelease bundleRelease --no-daemon
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: kodiq-${{ inputs.profile || 'release' }}-${{ github.sha }}
          path: |
            android/app/build/outputs/apk/*/app-*.apk
            android/app/build/outputs/bundle/*/app-*.aab
          retention-days: 30
